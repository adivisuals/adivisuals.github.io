<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aditya Vishwakarma — Video Editor Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Aditya Vishwakarma — a video editor crafting commentary, documentary, gaming and faceless edits. View my work and let's create something extraordinary."
    />
    <meta name="theme-color" content="#000000" />
    <meta name="author" content="Aditya Vishwakarma" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aditya Vishwakarma — Video Editor Portfolio" />
    <meta
      property="og:description"
      content="Editor · Creator · Storyteller. Commentary, documentary, gaming and faceless edits."
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!--
      Content Security Policy.
      The single-file build inlines JS/CSS, so inline scripts & styles are allowed.
      External connections are limited to Google Fonts and the EmailJS API.
      (Note: a meta CSP cannot enforce frame-ancestors; GitHub Pages doesn't
      support custom headers, so clickjacking hardening would need a different host.)
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://api.emailjs.com; object-src 'none'; base-uri 'self'; form-action 'self';"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
